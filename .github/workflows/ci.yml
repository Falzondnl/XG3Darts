name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  ENVIRONMENT: "test"
  LOG_LEVEL: "WARNING"
  # Use in-memory SQLite for tests (no PostgreSQL required in CI)
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379"
  GDPR_PSEUDONYM_SECRET: "ci-test-secret-not-for-production"

jobs:
  # ---------------------------------------------------------------------------
  # Lint + type check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --select E,F,W,I --ignore E501
        continue-on-error: true

      - name: Ruff format check
        run: ruff format --check .
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Unit + integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov httpx aiosqlite pytest-timeout

      - name: Run test suite
        run: |
          pytest tests/ \
            -x \
            --tb=short \
            -q \
            --timeout=120 \
            --ignore=tests/integration/test_stress.py \
            -m "not stress"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stress tests (run on main/develop only to save CI minutes)
  # ---------------------------------------------------------------------------
  stress:
    name: Stress tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-asyncio anyio[trio]

      - name: Run stress tests
        run: |
          pytest tests/integration/test_stress.py \
            --tb=short \
            -q \
            --timeout=300
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ---------------------------------------------------------------------------
  # Regression lock verification
  # ---------------------------------------------------------------------------
  regression-lock:
    name: Regression lock
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify regression lock
        run: python tests/regression/regression_lock_manager.py verify
        env:
          PYTHONPATH: ${{ github.workspace }}
        # If no lock file exists, this will pass (first run)
        # A lock file should be committed after sprint completion

  # ---------------------------------------------------------------------------
  # Docker build check
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t xg3-darts:ci .

      - name: Check container starts
        run: |
          docker run --rm \
            -e ENVIRONMENT=test \
            -e DATABASE_URL=sqlite+aiosqlite:///:memory: \
            -e LOG_LEVEL=WARNING \
            --name xg3-darts-ci \
            xg3-darts:ci \
            python -c "from app.main import create_app; app = create_app(); print('OK')"
